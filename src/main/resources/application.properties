spring.application.name=vibe-ops
server.port=3100

# Virtual Threads (Java 21)
spring.threads.virtual.enabled=true

# MCP Server config
vibeops.mcp.version=2024-11-05
vibeops.mcp.server-name=vibe-ops
vibeops.mcp.server-version=0.1.0

# Timeouts (reliability-first)
vibeops.execution.timeout-seconds=120
vibeops.execution.max-retries=3
