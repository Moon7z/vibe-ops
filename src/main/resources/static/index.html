<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpsZen Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.header{background:linear-gradient(135deg,#1e293b,#0f172a);border-bottom:1px solid #1e293b;padding:24px 40px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:12px}
.logo h1{font-size:28px;font-weight:700;background:linear-gradient(135deg,#38bdf8,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo span{font-size:13px;color:#64748b;border:1px solid #334155;padding:2px 8px;border-radius:4px}
.status-badge{display:flex;align-items:center;gap:8px;background:#022c22;border:1px solid #065f46;padding:6px 16px;border-radius:20px;font-size:14px;color:#34d399}
.status-badge .dot{width:8px;height:8px;background:#34d399;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.info-bar{display:flex;gap:24px;padding:16px 40px;background:#1e293b;border-bottom:1px solid #334155;font-size:13px;color:#94a3b8}
.info-bar span{display:flex;align-items:center;gap:6px}
.info-bar code{background:#0f172a;padding:2px 8px;border-radius:4px;color:#38bdf8;font-size:12px}
.main{padding:32px 40px}
.main h2{font-size:18px;color:#94a3b8;margin-bottom:20px;font-weight:500}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px;transition:all .2s;cursor:default}
.card:hover{border-color:#475569;transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.card-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.card-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.card-name{font-size:15px;font-weight:600;color:#f1f5f9;font-family:'Fira Code',monospace}
.card-desc{font-size:13px;color:#94a3b8;line-height:1.6}
.card-tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;margin-top:10px;font-weight:500}
.c-blue{background:#172554;color:#60a5fa}
.c-purple{background:#2e1065;color:#a78bfa}
.c-green{background:#052e16;color:#4ade80}
.c-orange{background:#431407;color:#fb923c}
.c-red{background:#450a0a;color:#f87171}
.c-cyan{background:#083344;color:#22d3ee}
.footer{text-align:center;padding:24px;color:#475569;font-size:12px;border-top:1px solid #1e293b;margin-top:40px}
.loading{text-align:center;padding:60px;color:#64748b}
.card{cursor:pointer}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:100;justify-content:center;align-items:center}
.modal-overlay.active{display:flex}
.modal{background:#1e293b;border:1px solid #334155;border-radius:16px;width:92%;max-width:640px;max-height:85vh;overflow-y:auto;padding:28px}
.modal-title{font-size:18px;font-weight:600;color:#f1f5f9;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.modal-close{margin-left:auto;background:none;border:none;color:#94a3b8;font-size:24px;cursor:pointer;line-height:1}
.modal-close:hover{color:#f1f5f9}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:13px;color:#94a3b8;margin-bottom:6px}
.form-label .req{color:#f87171}
.form-input,.form-textarea,.form-select{width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 12px;color:#e2e8f0;font-size:14px;font-family:inherit}
.form-input:focus,.form-textarea:focus,.form-select:focus{outline:none;border-color:#38bdf8}
.form-textarea{min-height:100px;resize:vertical}
.btn-exec{background:linear-gradient(135deg,#38bdf8,#818cf8);color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;width:100%;margin-top:8px}
.btn-exec:hover{opacity:.9}
.btn-exec:disabled{opacity:.5;cursor:not-allowed}
.result-box{margin-top:16px;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:16px;font-size:13px;color:#e2e8f0;white-space:pre-wrap;word-break:break-word;max-height:400px;overflow-y:auto;font-family:'Fira Code',monospace;line-height:1.6}
.result-error{border-color:#f87171;color:#f87171}
</style>
</head>
<body>
<div class="header">
  <div class="logo">
    <h1>OpsZen</h1>
    <span id="ver">v0.1.0</span>
  </div>
  <div class="status-badge"><div class="dot"></div><span id="status">Connecting...</span></div>
</div>
<div class="info-bar">
  <span>MCP Endpoint: <code>POST /mcp</code></span>
  <span>Protocol: <code>2024-11-05</code></span>
  <span>Tools: <code id="count">-</code></span>
</div>
<div class="main">
  <h2>MCP Tools</h2>
  <div class="grid" id="tools"><div class="loading">Loading tools...</div></div>
</div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">
      <span id="modal-icon"></span>
      <span id="modal-name"></span>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div id="modal-form"></div>
    <button class="btn-exec" id="btn-exec" onclick="executeTool()">Execute</button>
    <div class="result-box" id="result" style="display:none"></div>
  </div>
</div>
<div class="footer">OpsZen — Autonomous Production Bridge for AI-Generated Code</div>
<script>
const ICONS={
  'analyze-vibe':['🔍','c-blue','Spec Verifier'],
  'run-vibe-check':['🛡️','c-red','Static Scanner'],
  'generate-tests':['🧪','c-purple','Test Autopilot'],
  'run-tests':['▶️','c-green','Test Autopilot'],
  'test-gate':['🚦','c-orange','Quality Gate'],
  'generate-infra':['🏗️','c-cyan','Ghost Deployer'],
  'diagnose-failure':['🔬','c-red','Self-Healing'],
  'auto-heal':['💊','c-green','Self-Healing']
};
const SCHEMAS={
  'analyze-vibe':[
    {n:'prompt',t:'textarea',r:true,l:'开发需求 / Prompt'},
    {n:'context',t:'textarea',r:false,l:'附加上下文'}
  ],
  'run-vibe-check':[
    {n:'path',t:'text',r:true,l:'扫描路径',p:'C:\\\\path\\\\to\\\\project'},
    {n:'severity',t:'select',r:false,l:'最低严重级别',o:['LOW','MEDIUM','HIGH','CRITICAL']}
  ],
  'generate-tests':[
    {n:'projectPath',t:'text',r:true,l:'项目路径',p:'C:\\\\path\\\\to\\\\project'},
    {n:'filePath',t:'text',r:false,l:'指定文件'},
    {n:'mode',t:'select',r:false,l:'模式',o:['prompt','stub']},
    {n:'context',t:'textarea',r:false,l:'附加上下文'}
  ],
  'run-tests':[
    {n:'projectPath',t:'text',r:true,l:'项目路径',p:'C:\\\\path\\\\to\\\\project'},
    {n:'testClass',t:'text',r:false,l:'指定测试类',p:'com.example.FooTest'}
  ],
  'test-gate':[
    {n:'projectPath',t:'text',r:true,l:'项目路径',p:'C:\\\\path\\\\to\\\\project'},
    {n:'strict',t:'select',r:false,l:'严格模式',o:['false','true']}
  ],
  'generate-infra':[
    {n:'projectPath',t:'text',r:true,l:'项目路径',p:'C:\\\\path\\\\to\\\\project'},
    {n:'mode',t:'select',r:false,l:'模式',o:['preview','write']},
    {n:'postgres',t:'select',r:false,l:'PostgreSQL',o:['false','true']},
    {n:'redis',t:'select',r:false,l:'Redis',o:['false','true']},
    {n:'deploy',t:'select',r:false,l:'部署阶段',o:['false','true']}
  ],
  'diagnose-failure':[
    {n:'logs',t:'textarea',r:true,l:'错误日志 / Stack Trace'},
    {n:'context',t:'textarea',r:false,l:'部署上下文'}
  ],
  'auto-heal':[
    {n:'source',t:'select',r:true,l:'监控来源',o:['kubernetes','docker','logs']},
    {n:'namespace',t:'text',r:false,l:'K8s Namespace'},
    {n:'labelSelector',t:'text',r:false,l:'Label Selector',p:'app=my-service'},
    {n:'projectPath',t:'text',r:false,l:'项目路径'},
    {n:'logs',t:'textarea',r:false,l:'日志文本 (source=logs 时必填)'}
  ]
};
let currentTool=null;
fetch('/api/status').then(r=>r.json()).then(d=>{
  document.getElementById('status').textContent='Running';
  document.getElementById('ver').textContent='v'+d.version;
  document.getElementById('count').textContent=d.tools_count;
  const g=document.getElementById('tools');g.innerHTML='';
  d.tools.forEach(t=>{
    const m=ICONS[t.name]||['⚙️','c-blue','Tool'];
    const card=document.createElement('div');card.className='card';
    card.onclick=()=>openModal(t.name);
    card.innerHTML=`<div class="card-head"><div class="card-icon ${m[1]}">${m[0]}</div><div class="card-name">${t.name}</div></div><div class="card-desc">${t.description}</div><div class="card-tag ${m[1]}">${m[2]}</div>`;
    g.appendChild(card);
  });
}).catch(()=>{
  document.getElementById('status').textContent='Offline';
  document.getElementById('tools').innerHTML='<div class="loading">Failed to connect</div>';
});
function openModal(name){
  currentTool=name;
  const m=ICONS[name]||['⚙️','c-blue','Tool'];
  document.getElementById('modal-icon').textContent=m[0];
  document.getElementById('modal-name').textContent=name;
  const form=document.getElementById('modal-form');
  const schema=SCHEMAS[name]||[];
  form.innerHTML=schema.map(f=>{
    let inp='';
    if(f.t==='textarea')inp=`<textarea class="form-textarea" id="f-${f.n}" placeholder="${f.p||''}"></textarea>`;
    else if(f.t==='select')inp=`<select class="form-select" id="f-${f.n}">${f.o.map(o=>`<option value="${o}">${o}</option>`).join('')}</select>`;
    else inp=`<input class="form-input" type="text" id="f-${f.n}" placeholder="${f.p||''}">`;
    return `<div class="form-group"><label class="form-label">${f.l}${f.r?' <span class="req">*</span>':''}</label>${inp}</div>`;
  }).join('');
  document.getElementById('result').style.display='none';
  document.getElementById('btn-exec').disabled=false;
  document.getElementById('btn-exec').textContent='Execute';
  document.getElementById('modal').classList.add('active');
}
function closeModal(){document.getElementById('modal').classList.remove('active');currentTool=null;}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});
function executeTool(){
  if(!currentTool)return;
  const schema=SCHEMAS[currentTool]||[];
  const args={};
  for(const f of schema){
    const el=document.getElementById('f-'+f.n);
    const val=el?el.value.trim():'';
    if(f.r&&!val){alert('请填写: '+f.l);return;}
    if(val)args[f.n]=val;
  }
  const btn=document.getElementById('btn-exec');
  btn.disabled=true;btn.textContent='Executing...';
  const res=document.getElementById('result');res.style.display='none';
  fetch('/mcp',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({jsonrpc:'2.0',method:'tools/call',id:Date.now(),params:{name:currentTool,arguments:args}})
  }).then(r=>r.json()).then(d=>{
    res.style.display='block';res.className='result-box';
    if(d.result&&d.result.content)res.textContent=d.result.content.map(c=>c.text||'').join('\n');
    else if(d.error){res.className='result-box result-error';res.textContent='Error: '+d.error.message;}
    else res.textContent=JSON.stringify(d,null,2);
    btn.disabled=false;btn.textContent='Execute';
  }).catch(e=>{
    res.style.display='block';res.className='result-box result-error';
    res.textContent='Request failed: '+e.message;
    btn.disabled=false;btn.textContent='Execute';
  });
}
</script>
</body>
</html>
